<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Apply the saved theme before first paint to avoid a flash of the wrong mode. -->
    <script type="text/javascript">
      (function () {
        try {
          var t = localStorage.getItem('theme');
          document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <title>Border Beam – Animated border beam component for Svelte</title>
    <meta
      name="description"
      content="A lightweight Svelte component that renders an animated glowing border beam effect. Supports multiple sizes, color variants, and themes."
    />
    <meta name="theme-color" content="#070707" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/demo/main.ts"></script>
  </body>
</html>
